<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Trading Team — Login</title>
<style>
:root { --bg:#0d1117; --surface:#161b22; --border:#30363d; --text:#e6edf3;
        --muted:#8b949e; --accent:#58a6ff; --green:#3fb950; --red:#f85149; --radius:8px; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
       background:var(--bg); color:var(--text); min-height:100vh;
       display:flex; align-items:center; justify-content:center; }
.login-box { background:var(--surface); border:1px solid var(--border);
             border-radius:12px; padding:40px; width:380px; }
.login-box h1 { font-size:20px; margin-bottom:4px; }
.login-box .sub { color:var(--muted); font-size:13px; margin-bottom:28px; }
.field { margin-bottom:16px; }
.field label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px;
               text-transform:uppercase; letter-spacing:0.5px; }
.field input { width:100%; padding:10px 12px; border-radius:6px; border:1px solid var(--border);
               background:var(--bg); color:var(--text); font-size:14px; outline:none; }
.field input:focus { border-color:var(--accent); }
.btn { width:100%; padding:10px; border-radius:var(--radius); border:none; cursor:pointer;
       font-size:14px; font-weight:600; background:var(--accent); color:#fff; margin-top:8px; }
.btn:hover { background:#79c0ff; }
.btn-secondary { background:transparent; border:1px solid var(--border); color:var(--text); margin-top:8px; }
.btn-secondary:hover { background:var(--surface); border-color:var(--accent); }
.error { color:var(--red); font-size:13px; margin-top:12px; display:none; }
.tabs { display:flex; margin-bottom:24px; border-bottom:1px solid var(--border); }
.tab { flex:1; text-align:center; padding:10px; cursor:pointer; color:var(--muted);
       font-size:14px; border-bottom:2px solid transparent; }
.tab.active { color:var(--text); border-bottom-color:var(--accent); }
.form { display:none; }
.form.active { display:block; }
</style>
</head>
<body>
<div class="login-box">
  <h1>🤖 AI Trading Team</h1>
  <div class="sub">Sign in to access your trading dashboard</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <div id="form-login" class="form active">
    <div class="field">
      <label>Username</label>
      <input type="text" id="login-user" autocomplete="username" autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" autocomplete="current-password">
    </div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="error" id="login-error"></div>
  </div>

  <div id="form-register" class="form">
    <div class="field">
      <label>Username</label>
      <input type="text" id="reg-user" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="reg-pass2" autocomplete="new-password">
    </div>
    <button class="btn" onclick="doRegister()">Create Account</button>
    <div class="error" id="reg-error"></div>
  </div>
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.getElementById('form-'+name).classList.add('active');
  event.target.classList.add('active');
}

async function doLogin() {
  const user = document.getElementById('login-user').value;
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  err.style.display='none';
  if (!user||!pass) { err.textContent='Fill in both fields'; err.style.display='block'; return; }
  const r = await fetch('/api/auth/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:user, password:pass})
  });
  const d = await r.json();
  if (d.ok) { window.location.href='/'; }
  else { err.textContent=d.msg; err.style.display='block'; }
}

async function doRegister() {
  const user = document.getElementById('reg-user').value;
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;
  const err = document.getElementById('reg-error');
  err.style.display='none';
  if (!user||!pass) { err.textContent='Fill in all fields'; err.style.display='block'; return; }
  if (pass!==pass2) { err.textContent='Passwords do not match'; err.style.display='block'; return; }
  if (pass.length<4) { err.textContent='Password must be at least 4 characters'; err.style.display='block'; return; }
  const r = await fetch('/api/auth/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username:user, password:pass})
  });
  const d = await r.json();
  if (d.ok) { window.location.href='/'; }
  else { err.textContent=d.msg; err.style.display='block'; }
}

// Enter key support
document.getElementById('login-pass').addEventListener('keydown', e=>{if(e.key==='Enter')doLogin()});
document.getElementById('reg-pass2').addEventListener('keydown', e=>{if(e.key==='Enter')doRegister()});
</script>
</body>
</html>
